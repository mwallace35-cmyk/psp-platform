<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="baseballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseballAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#baseballGrad)"/>

  <!-- Diamond outline -->
  <g fill="none" stroke="#dc2626" stroke-width="2" opacity="0.2">
    <polygon points="200,50 350,150 200,250 50,150"/>
  </g>

  <!-- Base markers -->
  <g opacity="0.15" fill="#dc2626">
    <rect x="190" y="235" width="20" height="20"/>
    <rect x="190" y="45" width="20" height="20"/>
    <rect x="330" y="140" width="20" height="20"/>
    <rect x="50" y="140" width="20" height="20"/>
  </g>

  <!-- Batter legs -->
  <g fill="#0a1628" opacity="0.9">
    <path d="M 90 185 L 75 290 L 95 290 L 110 185 Z" stroke="#dc2626" stroke-width="1"/>
    <path d="M 115 180 L 110 290 L 130 290 L 135 180 Z" stroke="#dc2626" stroke-width="1"/>
  </g>

  <!-- Batter torso -->
  <ellipse cx="105" cy="125" rx="22" ry="65" fill="#0f2040" stroke="#dc2626" stroke-width="1.5" opacity="0.95" transform="rotate(-15 105 125)"/>

  <!-- Back arm -->
  <g fill="none" stroke="#0f2040" stroke-width="10" stroke-linecap="round">
    <path d="M 85 105 Q 40 80 20 40" opacity="0.85"/>
  </g>
  <g fill="none" stroke="#dc2626" stroke-width="2" opacity="0.5">
    <path d="M 85 105 Q 40 80 20 40"/>
  </g>

  <!-- Bat (front arm) -->
  <g fill="none" stroke="#8b7355" stroke-width="9" stroke-linecap="round" opacity="0.8">
    <path d="M 120 100 L 280 30"/>
  </g>
  <!-- Bat highlight -->
  <g fill="none" stroke="#a0826d" stroke-width="3" opacity="0.6">
    <path d="M 120 100 L 280 30"/>
  </g>

  <!-- Batter head -->
  <circle cx="100" cy="55" r="16" fill="#0f2040" stroke="#dc2626" stroke-width="1.5" opacity="0.95"/>

  <!-- Baseball -->
  <circle cx="295" cy="20" r="13" fill="url(#baseballAccent)" opacity="0.85" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Baseball stitches -->
  <g stroke="#0a1628" stroke-width="1" opacity="0.6" fill="none" stroke-linecap="round">
    <path d="M 290 15 Q 295 25 300 15"/>
    <path d="M 290 25 Q 295 20 300 25"/>
  </g>

  <!-- Ball trajectory arc -->
  <g fill="none" stroke="#dc2626" stroke-width="2.5" opacity="0.5" stroke-dasharray="4,4">
    <path d="M 290 35 Q 320 80 300 150"/>
  </g>

  <!-- Motion trail lines -->
  <g stroke="#dc2626" stroke-width="2" opacity="0.3" fill="none" stroke-dasharray="3,3">
    <path d="M 270 50 L 250 75"/>
    <path d="M 280 45 L 255 85"/>
    <path d="M 290 40 L 260 100"/>
  </g>

  <!-- Dynamic swing lines -->
  <g stroke="#dc2626" stroke-width="2" opacity="0.25" fill="none">
    <path d="M 135 160 Q 160 130 185 110"/>
    <path d="M 130 180 Q 160 150 190 120"/>
  </g>

  <!-- Energy burst around ball -->
  <g fill="none" stroke="#dc2626" stroke-width="2" opacity="0.2">
    <circle cx="295" cy="20" r="20" fill="none"/>
    <circle cx="295" cy="20" r="27" fill="none"/>
  </g>

  <!-- Geometric accent -->
  <g fill="none" stroke="#dc2626" stroke-width="2" opacity="0.15">
    <polygon points="340,200 370,180 385,240 355,260"/>
  </g>
</svg>