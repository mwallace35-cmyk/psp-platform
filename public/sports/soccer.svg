<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="soccerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="soccerAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#soccerGrad)"/>

  <!-- Field lines -->
  <g opacity="0.15" stroke="#10b981" stroke-width="2">
    <rect x="20" y="30" width="360" height="240" fill="none"/>
    <line x1="200" y1="30" x2="200" y2="270"/>
    <circle cx="200" cy="150" r="35" fill="none"/>
    <circle cx="200" cy="150" r="3" fill="#10b981"/>
  </g>

  <!-- Goal box outlines -->
  <g fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.15">
    <rect x="280" y="100" width="80" height="100"/>
    <rect x="40" y="100" width="80" height="100"/>
  </g>

  <!-- Player legs (kicking position) -->
  <g fill="#0a1628" opacity="0.9">
    <path d="M 90 175 L 75 280 L 95 280 L 110 175 Z" stroke="#10b981" stroke-width="1"/>
    <!-- Kicking leg (extended) -->
    <path d="M 125 165 L 155 280 L 175 280 L 145 165 Z" stroke="#10b981" stroke-width="1" transform="rotate(25 140 200)"/>
  </g>

  <!-- Player torso (kicking motion) -->
  <ellipse cx="110" cy="115" rx="23" ry="60" fill="#0f2040" stroke="#10b981" stroke-width="1.5" opacity="0.95" transform="rotate(-20 110 115)"/>

  <!-- Back arm (balance) -->
  <g fill="none" stroke="#0f2040" stroke-width="10" stroke-linecap="round">
    <path d="M 90 105 Q 60 80 35 50" opacity="0.85"/>
  </g>
  <g fill="none" stroke="#10b981" stroke-width="2" opacity="0.5">
    <path d="M 90 105 Q 60 80 35 50"/>
  </g>

  <!-- Front arm (balance/follow-through) -->
  <g fill="none" stroke="#0f2040" stroke-width="10" stroke-linecap="round">
    <path d="M 130 105 Q 165 75 200 45" opacity="0.85"/>
  </g>
  <g fill="none" stroke="#10b981" stroke-width="2" opacity="0.5">
    <path d="M 130 105 Q 165 75 200 45"/>
  </g>

  <!-- Player head -->
  <circle cx="105" cy="50" r="16" fill="#0f2040" stroke="#10b981" stroke-width="1.5" opacity="0.95"/>

  <!-- Soccer ball -->
  <circle cx="180" cy="20" r="14" fill="url(#soccerAccent)" opacity="0.85" stroke="#10b981" stroke-width="1.5"/>
  <!-- Ball pentagon pattern -->
  <g fill="none" stroke="#0a1628" stroke-width="1" opacity="0.5">
    <polygon points="180,10 186,15 184,23 176,23 174,15"/>
  </g>

  <!-- Ball trajectory arc -->
  <g fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.5" stroke-dasharray="4,4">
    <path d="M 175 40 Q 240 50 300 80"/>
  </g>

  <!-- Kick power lines -->
  <g stroke="#10b981" stroke-width="2" opacity="0.3" fill="none" stroke-linecap="round">
    <path d="M 140 165 L 165 140"/>
    <path d="M 135 180 L 165 155"/>
    <path d="M 145 195 L 170 175"/>
  </g>

  <!-- Goal net pattern (defender side) -->
  <g fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.25">
    <g>
      <!-- Net frame -->
      <polygon points="300,110 360,110 365,130 295,130"/>
      <polygon points="300,170 360,170 365,150 295,150"/>
      <!-- Net grid -->
      <line x1="300" y1="130" x2="365" y2="130" opacity="0.3"/>
      <line x1="300" y1="150" x2="365" y2="150" opacity="0.3"/>
      <line x1="315" y1="110" x2="315" y2="170" opacity="0.2"/>
      <line x1="330" y1="110" x2="330" y2="170" opacity="0.2"/>
      <line x1="345" y1="110" x2="345" y2="170" opacity="0.2"/>
    </g>
  </g>

  <!-- Motion trail effect -->
  <g fill="none" stroke="#10b981" stroke-width="2" opacity="0.25" stroke-dasharray="3,3">
    <path d="M 155 165 L 180 130"/>
    <path d="M 165 170 L 190 135"/>
  </g>

  <!-- Speed lines -->
  <g stroke="#10b981" stroke-width="2" opacity="0.3" fill="none">
    <path d="M 195 50 L 220 40"/>
    <path d="M 200 65 L 230 60"/>
    <path d="M 190 80 L 225 75"/>
  </g>

  <!-- Energy burst around ball -->
  <g fill="none" stroke="#10b981" stroke-width="2" opacity="0.2">
    <circle cx="180" cy="20" r="22"/>
    <circle cx="180" cy="20" r="29"/>
  </g>

  <!-- Geometric accent -->
  <g fill="none" stroke="#10b981" stroke-width="2" opacity="0.15">
    <polygon points="50,260 80,240 100,290 70,310"/>
    <polygon points="320,280 350,260 370,300 340,320"/>
  </g>
</svg>