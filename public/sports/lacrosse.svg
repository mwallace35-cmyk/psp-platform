<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="lacrosseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lacrosseAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#lacrosseGrad)"/>

  <!-- Field lines -->
  <g opacity="0.15" stroke="#06b6d4" stroke-width="2">
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="220" x2="400" y2="220"/>
  </g>

  <!-- Goal box accent -->
  <g fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.2">
    <circle cx="200" cy="150" r="60"/>
    <path d="M 150 150 Q 200 100 250 150"/>
  </g>

  <!-- Player legs -->
  <g fill="#0a1628" opacity="0.9">
    <path d="M 100 170 L 85 280 L 105 280 L 120 170 Z" stroke="#06b6d4" stroke-width="1"/>
    <path d="M 125 165 L 120 280 L 140 280 L 145 165 Z" stroke="#06b6d4" stroke-width="1"/>
  </g>

  <!-- Player torso -->
  <ellipse cx="112" cy="115" rx="24" ry="58" fill="#0f2040" stroke="#06b6d4" stroke-width="1.5" opacity="0.95" transform="rotate(-10 112 115)"/>

  <!-- Left arm (stick hand) -->
  <g fill="none" stroke="#0f2040" stroke-width="10" stroke-linecap="round">
    <path d="M 88 105 Q 50 85 30 50" opacity="0.85"/>
  </g>
  <g fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5">
    <path d="M 88 105 Q 50 85 30 50"/>
  </g>

  <!-- Lacrosse stick shaft -->
  <g fill="none" stroke="#8b7355" stroke-width="6" stroke-linecap="round" opacity="0.8">
    <path d="M 30 50 L 40 10"/>
  </g>

  <!-- Stick pocket net (diamond mesh) -->
  <g stroke="#06b6d4" stroke-width="1.5" opacity="0.6" fill="none">
    <polygon points="35,15 45,10 50,25 40,30"/>
    <line x1="35" y1="15" x2="50" y2="25"/>
    <line x1="45" y1="10" x2="40" y2="30"/>
    <line x1="38" y1="15" x2="47" y2="20"/>
    <line x1="42" y1="12" x2="43" y2="28"/>
  </g>

  <!-- Right arm (balance) -->
  <g fill="none" stroke="#0f2040" stroke-width="10" stroke-linecap="round">
    <path d="M 135 110 Q 175 95 210 85" opacity="0.85"/>
  </g>
  <g fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5">
    <path d="M 135 110 Q 175 95 210 85"/>
  </g>

  <!-- Player head -->
  <circle cx="110" cy="55" r="16" fill="#0f2040" stroke="#06b6d4" stroke-width="1.5" opacity="0.95"/>

  <!-- Lacrosse ball -->
  <circle cx="55" cy="25" r="12" fill="url(#lacrosseAccent)" opacity="0.85" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- Ball dimple pattern -->
  <g fill="#06b6d4" opacity="0.4">
    <circle cx="52" cy="22" r="1.5"/>
    <circle cx="58" cy="22" r="1.5"/>
    <circle cx="55" cy="28" r="1.5"/>
  </g>

  <!-- Ball arc trajectory -->
  <g fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.45" stroke-dasharray="5,5">
    <path d="M 50 40 Q 120 30 200 60"/>
  </g>

  <!-- Goal net pattern (behind) -->
  <g fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.25">
    <circle cx="280" cy="150" r="35"/>
    <g opacity="0.3">
      <line x1="280" y1="115" x2="280" y2="185"/>
      <line x1="245" y1="150" x2="315" y2="150"/>
      <line x1="252" y1="120" x2="308" y2="180"/>
      <line x1="252" y1="180" x2="308" y2="120"/>
    </g>
  </g>

  <!-- Dynamic motion lines -->
  <g stroke="#06b6d4" stroke-width="2" opacity="0.3" fill="none">
    <path d="M 145 135 L 175 120"/>
    <path d="M 140 155 L 175 145"/>
    <path d="M 135 175 L 170 170"/>
  </g>

  <!-- Cradling motion arc -->
  <g fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.2">
    <path d="M 40 60 Q 70 45 100 50"/>
    <path d="M 45 55 Q 75 40 105 45"/>
  </g>

  <!-- Geometric accent -->
  <g fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.15">
    <polygon points="320,220 350,200 370,250 340,270"/>
  </g>
</svg>