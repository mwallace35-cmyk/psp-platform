<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trackAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#trackGrad)"/>

  <!-- Track curve -->
  <g fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity="0.2">
    <path d="M 0 180 Q 200 80 400 180"/>
    <path d="M 0 200 Q 200 100 400 200"/>
  </g>

  <!-- Lane lines -->
  <g opacity="0.15" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="10,10">
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="190" x2="400" y2="190"/>
    <line x1="0" y1="220" x2="400" y2="220"/>
  </g>

  <!-- Finish line ribbon (background) -->
  <g opacity="0.15">
    <rect x="350" y="80" width="8" height="200" fill="#8b5cf6"/>
    <rect x="355" y="85" width="8" height="190" fill="#0a1628"/>
  </g>

  <!-- Runner legs (sprint position) -->
  <g fill="#0a1628" opacity="0.9">
    <!-- Back leg (extended) -->
    <path d="M 80 175 L 75 260 L 95 260 L 100 175 Z" stroke="#8b5cf6" stroke-width="1" transform="rotate(-35 85 175)"/>
    <!-- Front leg (lifted) -->
    <path d="M 130 165 L 140 260 L 160 260 L 150 165 Z" stroke="#8b5cf6" stroke-width="1"/>
  </g>

  <!-- Runner torso (forward lean) -->
  <ellipse cx="115" cy="110" rx="22" ry="62" fill="#0f2040" stroke="#8b5cf6" stroke-width="1.5" opacity="0.95" transform="rotate(-30 115 110)"/>

  <!-- Back arm (driving motion) -->
  <g fill="none" stroke="#0f2040" stroke-width="10" stroke-linecap="round">
    <path d="M 95 105 Q 60 75 40 50" opacity="0.85"/>
  </g>
  <g fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6">
    <path d="M 95 105 Q 60 75 40 50"/>
  </g>

  <!-- Front arm (driving motion) -->
  <g fill="none" stroke="#0f2040" stroke-width="10" stroke-linecap="round">
    <path d="M 135 100 Q 165 70 190 45" opacity="0.85"/>
  </g>
  <g fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6">
    <path d="M 135 100 Q 165 70 190 45"/>
  </g>

  <!-- Runner head (looking forward) -->
  <circle cx="110" cy="45" r="16" fill="#0f2040" stroke="#8b5cf6" stroke-width="1.5" opacity="0.95"/>

  <!-- Speed lines (motion blur) -->
  <g stroke="#8b5cf6" stroke-width="2" opacity="0.35" fill="none" stroke-linecap="round">
    <line x1="30" y1="80" x2="50" y2="70"/>
    <line x1="25" y1="110" x2="50" y2="105"/>
    <line x1="35" y1="140" x2="60" y2="140"/>
    <line x1="50" y1="165" x2="80" y2="170"/>
  </g>

  <!-- Acceleration wave -->
  <g fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.3" stroke-dasharray="5,5">
    <path d="M 25 120 Q 100 90 200 70"/>
  </g>

  <!-- Finish line burst -->
  <g fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity="0.4">
    <path d="M 348 150 L 368 150"/>
    <path d="M 348 200 L 368 200"/>
  </g>

  <!-- Ribbon finish lines -->
  <g opacity="0.25" stroke="#8b5cf6" stroke-width="2" fill="none">
    <line x1="345" y1="130" x2="365" y2="130"/>
    <line x1="345" y1="145" x2="365" y2="145"/>
    <line x1="345" y1="160" x2="365" y2="160"/>
    <line x1="345" y1="175" x2="365" y2="175"/>
    <line x1="345" y1="190" x2="365" y2="190"/>
    <line x1="345" y1="205" x2="365" y2="205"/>
    <line x1="345" y1="220" x2="365" y2="220"/>
  </g>

  <!-- Dynamic energy burst -->
  <g fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.2">
    <circle cx="360" cy="175" r="20"/>
    <circle cx="360" cy="175" r="28"/>
  </g>

  <!-- Geometric accent curves -->
  <g fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.15">
    <path d="M 250 260 Q 280 240 310 250"/>
    <polygon points="50,280 85,270 95,290 60,300"/>
  </g>
</svg>