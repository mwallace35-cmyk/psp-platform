<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="wrestlingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wrestlingAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ca8a04;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#wrestlingGrad)"/>

  <!-- Wrestling mat circle -->
  <g fill="none" stroke="#eab308" stroke-width="3" opacity="0.25">
    <circle cx="200" cy="155" r="90"/>
  </g>

  <!-- Mat center circle -->
  <g fill="none" stroke="#eab308" stroke-width="2" opacity="0.2">
    <circle cx="200" cy="155" r="50"/>
  </g>

  <!-- Mat boundary lines -->
  <g fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.15">
    <circle cx="200" cy="155" r="110"/>
    <line x1="200" y1="45" x2="200" y2="265"/>
    <line x1="90" y1="155" x2="310" y2="155"/>
  </g>

  <!-- Wrestler 1 (bottom/attacking) -->
  <!-- Head -->
  <circle cx="140" cy="95" r="15" fill="#0f2040" stroke="#eab308" stroke-width="1.5" opacity="0.95"/>

  <!-- Torso 1 -->
  <ellipse cx="140" cy="145" rx="20" ry="48" fill="#0a1628" stroke="#eab308" stroke-width="1.5" opacity="0.9" transform="rotate(-25 140 145)"/>

  <!-- Arms 1 (grapple position) -->
  <g fill="none" stroke="#0f2040" stroke-width="9" stroke-linecap="round">
    <path d="M 125 125 Q 105 110 95 95" opacity="0.85"/>
    <path d="M 155 130 Q 180 120 200 110" opacity="0.85"/>
  </g>

  <!-- Arm outlines 1 -->
  <g fill="none" stroke="#eab308" stroke-width="2" opacity="0.5">
    <path d="M 125 125 Q 105 110 95 95"/>
    <path d="M 155 130 Q 180 120 200 110"/>
  </g>

  <!-- Legs 1 -->
  <g fill="#0a1628" opacity="0.85">
    <path d="M 130 190 L 120 270 L 140 270 L 150 190 Z" stroke="#eab308" stroke-width="1"/>
    <path d="M 155 185 L 155 270 L 175 270 L 175 185 Z" stroke="#eab308" stroke-width="1"/>
  </g>

  <!-- Wrestler 2 (top/defending) -->
  <!-- Head -->
  <circle cx="260" cy="115" r="15" fill="#0f2040" stroke="#eab308" stroke-width="1.5" opacity="0.95"/>

  <!-- Torso 2 -->
  <ellipse cx="260" cy="160" rx="20" ry="48" fill="#0a1628" stroke="#eab308" stroke-width="1.5" opacity="0.9" transform="rotate(20 260 160)"/>

  <!-- Arms 2 (counterhold) -->
  <g fill="none" stroke="#0f2040" stroke-width="9" stroke-linecap="round">
    <path d="M 245 140 Q 220 125 200 115" opacity="0.85"/>
    <path d="M 275 145 Q 295 135 310 120" opacity="0.85"/>
  </g>

  <!-- Arm outlines 2 -->
  <g fill="none" stroke="#eab308" stroke-width="2" opacity="0.5">
    <path d="M 245 140 Q 220 125 200 115"/>
    <path d="M 275 145 Q 295 135 310 120"/>
  </g>

  <!-- Legs 2 -->
  <g fill="#0a1628" opacity="0.85">
    <path d="M 250 210 L 240 280 L 260 280 L 270 210 Z" stroke="#eab308" stroke-width="1"/>
    <path d="M 275 210 L 275 280 L 295 280 L 295 210 Z" stroke="#eab308" stroke-width="1"/>
  </g>

  <!-- Grapple connection lines -->
  <g fill="none" stroke="#eab308" stroke-width="2.5" opacity="0.4">
    <path d="M 155 130 L 200 115"/>
    <path d="M 125 125 L 155 140"/>
  </g>

  <!-- Dynamic pressure arc -->
  <g fill="none" stroke="#eab308" stroke-width="2" opacity="0.3" stroke-dasharray="4,4">
    <path d="M 145 160 Q 200 150 255 170"/>
  </g>

  <!-- Motion energy lines -->
  <g stroke="#eab308" stroke-width="2" opacity="0.25" fill="none">
    <path d="M 170 150 L 190 140"/>
    <path d="M 165 170 L 190 160"/>
    <path d="M 175 190 L 200 180"/>
  </g>

  <!-- Struggle intensity marks -->
  <g fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.2">
    <path d="M 110 80 L 105 70"/>
    <path d="M 120 75 L 118 63"/>
    <path d="M 310 130 L 318 120"/>
    <path d="M 300 140 L 310 132"/>
  </g>

  <!-- Geometric accent -->
  <g fill="none" stroke="#eab308" stroke-width="2" opacity="0.15">
    <polygon points="40,240 70,220 90,270 60,290"/>
    <polygon points="330,220 360,240 340,290 310,270"/>
  </g>
</svg>